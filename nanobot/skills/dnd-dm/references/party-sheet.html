function abMod(n){var m=Math.floor((n-10)/2);return m>=0?"+"+m:""+m}
function render(idx){
  var ch=CHARS[idx];var xpp=Math.min(100,(ch.xp/ch.mxp)*100);
  var svOrder=["力量","敏捷","体质","智力","感知","魅力"];
  var svHTML="";var skillHTML="";var resHTML="";var atkHTML="";var featHTML="";
  for(var si=0;si<svOrder.length;si++){
    var sk=svOrder[si];var sv=ch.saves[sk];
    svHTML+='<div class="sv-row"><span>'+sk.substr(0,1)+'</span><span'+(sv>=0?' style="color:#5b8;font-weight:700"':'')+'>'+(sv>=0?"+":"")+sv+'</span></div>';
  }
  for(var si=0;si<ch.skills.length;si++){
    var s=ch.skills[si];var prefix="";var cls="";
    if(s.expertise){cls=' style="color:#7da;font-weight:700"';prefix="★ ";}
    else if(s.prof){cls=' style="color:#5b8;font-weight:700"';prefix="● ";}
    skillHTML+='<div class="sv-row"><span'+cls+'>'+prefix+s.name+'</span><span'+cls+'>'+(s.mod>=0?"+":"")+s.mod+'</span></div>';
  }
  for(var ri=0;ri<ch.res.length;ri++){resHTML+='<div class="res-item"><span class="rn">'+ch.res[ri].name+'</span><span class="rv">'+ch.res[ri].val+'</span></div>';}
  for(var ai=0;ai<ch.attacks.length;ai++){var a=ch.attacks[ai];atkHTML+='<tr><td>'+a.name+'</td><td>'+a.bonus+'</td><td>'+a.dmg+'</td><td style="color:#888">'+(a.note||"")+'</td></tr>';}
  featHTML=ch.features.map(function(f){return '<span class="feature-tag">'+f+'</span>';}).join("");
  var itemHTML=ch.items.map(function(it){return '<li>'+it+'</li>';}).join("");
  return '<div class="card">'+
    '<div class="card-header"><div class="h-row">'+
      '<div><div class="name">'+ch.race+' · '+ch.name+'</div>'+
      '<div class="race-cls">'+ch.cls+(ch.sub?' ['+ch.sub+']':'')+' Lv.'+ch.lv+'</div>'+
      '<div class="ac-detail">AC '+ch.ac+' — '+ch.acDetail+'</div></div>'+
      '<div style="text-align:right;flex-shrink:0"><div class="hp-big">'+ch.hp+'</div>'+
      '<div class="hp-label">/'+ch.mhp+' HP</div>'+
      '<div style="color:#888;font-size:10px;margin-top:4px">Init +'+ch.init+' · Spd '+ch.spd+'</div></div>'+
    '</div><div class="xp-bar"><div class="xp-fill" style="width:'+xpp+'%"></div></div>'+
    '<div style="display:flex;justify-content:space-between;font-size:10px;color:#888;margin-top:2px">'+
      '<span>'+ch.armor+'</span><span>EXP '+ch.xp+'/'+ch.mxp+'</span></div></div>'+
    '<div class="content"><div class="left-col">'+
      '<div class="stat-block"><div class="stat-title">✦ 属性</div>'+
      Object.keys(ch.stats).map(function(k){return '<div class="ability-row"><span class="ab">'+k+'</span><span class="val">'+ch.stats[k]+'</span><span class="mod">'+abMod(ch.stats[k])+'</span></div>';}).join("")+'</div>'+
      '<div class="stat-block"><div class="stat-title">✦ 豁免</div>'+svHTML+'</div>'+
      '<div class="prof-box"><div class="big">+'+(ch.prof)+'</div><div class="lbl">熟练加值</div></div></div>'+
    '<div class="right-col">'+
      '<div class="section"><div class="section-title">技能</div><div class="skill-grid">'+skillHTML+'</div></div>'+
      '<div class="section"><div class="section-title">资源</div>'+resHTML+'</div>'+
      '<div class="section"><div class="section-title">攻击</div><table class="attacks-table"><tr><th>名称</th><th>加值</th><th>伤害</th><th>备注</th></tr>'+atkHTML+'</table></div>'+
      '<div class="section"><div class="section-title">特征</div>'+featHTML+'</div>'+
      '<div class="section"><div class="section-title">装备 <span class="item-count">('+ch.items.length+')</span></div><ul class="items-list">'+itemHTML+'</ul></div>'+
      '<div class="section"><div class="section-title">物品/资金</div><div class="gear-list">'+ch.gear+'</div></div>'+
    '</div></div></div>';
}
function renderAll(){
  var html='<div class="all-4up">';for(var i=0;i<CHARS.length;i++)html+=render(i);html+='</div>';
  document.getElementById("root").innerHTML=html;
}
var emojis=["🗡️","⚔️","✨","🔮"];
var tabHTML='<button class="tab tab-all active" data-idx="all">👥全员</button>';
for(var i=0;i<CHARS.length;i++)tabHTML+='<button class="tab" data-idx="'+i+'">'+emojis[i]+' '+CHARS[i].name.split("·")[0]+'</button>';
document.getElementById("tabs").innerHTML=tabHTML;renderAll();
document.getElementById("tabs").addEventListener("click",function(e){
  var btn=e.target.closest(".tab");if(!btn)return;
  var idx=btn.getAttribute("data-idx");
  document.querySelectorAll(".tab").forEach(function(t){t.classList.remove("active");});btn.classList.add("active");
  document.getElementById("root").innerHTML=idx==="all"?renderAll():render(parseInt(idx));
});
</script>
