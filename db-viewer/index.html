<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>SagaSmith DB Viewer</title>
<style>
:root { color-scheme: dark; }
body { margin: 0; font: 14px system-ui; background: #111; color: #eee; }
header { background: #1a1a2e; padding: 12px 20px; display: flex; gap: 8px; align-items: center; }
header h1 { font-size: 18px; margin: 0; }
header button { padding: 6px 14px; border: 1px solid #333; border-radius: 6px; background: #222; color: #ccc; cursor: pointer; }
header button.active { background: #4a4aff; color: white; border-color: #4a4aff; }
main { max-width: 1400px; margin: 0 auto; padding: 20px; }
table { width: 100%; border-collapse: collapse; margin-bottom: 24px; }
th, td { padding: 6px 10px; text-align: left; border-bottom: 1px solid #222; font-size: 13px; }
th { background: #1a1a2e; position: sticky; top: 0; }
tr:hover { background: #1a1a2e; }
.badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 11px; }
.badge-green { background: #064e3b; color: #6ee7b7; }
.badge-amber { background: #78350f; color: #fcd34d; }
.badge-blue { background: #1e3a5f; color: #93c5fd; }
.badge-purple { background: #4a1d96; color: #c4b5fd; }
.error { color: #ef4444; padding: 20px; }
.loading { text-align: center; padding: 40px; color: #666; }
.card { background: #1a1a2e; border-radius: 8px; padding: 16px; margin-bottom: 16px; }
.card h3 { margin: 0 0 8px 0; font-size: 14px; color: #aaa; }
</style>
</head>
<body>
<header>
  <h1>DB Viewer</h1>
  <button onclick="showTab('campaigns')" id="btn-campaigns">Campaigns</button>
  <button onclick="showTab('characters')" id="btn-characters">Characters</button>
  <button onclick="showTab('world')" id="btn-world">World State</button>
  <button onclick="showTab('rules')" id="btn-rules">Rules</button>
  <button onclick="showTab('saves')" id="btn-saves">Saves</button>
  <span style="margin-left:auto;font-size:12px;color:#666" id="status">connecting...</span>
</header>
<main id="main">
  <div class="loading">Connecting to gateway...</div>
</main>
<script>
let TOKEN = '';
const BASE = '';
const GATEWAY = window.location.origin || 'http://127.0.0.1:18765';

async function init() {
  try {
    const res = await fetch(GATEWAY + '/webui/bootstrap');
    if (!res.ok) throw new Error('Gateway not reachable');
    const data = await res.json();
    TOKEN = data.token;
    document.getElementById('status').textContent = 'connected';
    showTab('campaigns');
  } catch (e) {
    document.getElementById('main').innerHTML = '<div class="error">Cannot connect to gateway at ' + GATEWAY + '. Is it running?</div>';
    document.getElementById('status').textContent = 'error';
  }
}

function h(tag, attrs, ...children) {
  const el = document.createElement(tag);
  if (attrs) Object.entries(attrs).forEach(([k,v]) => { if (v != null) el[k] = v; });
  children.forEach(c => { if (c != null) el.append(typeof c === 'string' ? document.createTextNode(c) : c); });
  return el;
}

async function fetchJson(path) {
  const res = await fetch(BASE + path, { headers: { Authorization: 'Bearer ' + TOKEN } });
  if (!res.ok) throw new Error(path + ': ' + res.status);
  return res.json();
}

function setActive(btn) {
  document.querySelectorAll('header button').forEach(b => b.classList.remove('active'));
  document.getElementById('btn-' + btn).classList.add('active');
}

function statBadge(v) { return h('span', { className: 'badge ' + (v > 0 ? 'badge-green' : 'badge-amber') }, String(v)); }

async function showTab(tab) {
  setActive(tab);
  const main = document.getElementById('main');
  main.innerHTML = '<div class="loading">Loading...</div>';
  try {
    if (tab === 'campaigns') await showCampaigns(main);
    if (tab === 'characters') await showCharacters(main);
    if (tab === 'world') await showWorld(main);
    if (tab === 'rules') await showRules(main);
    if (tab === 'saves') await showSaves(main);
  } catch (e) {
    main.innerHTML = '<div class="error">' + e.message + '</div>';
  }
}

// ── Campaigns ──
async function showCampaigns(main) {
  const data = await fetchJson('/api/dnd/campaigns');
  if (!data.length) { main.innerHTML = '<p>No campaigns</p>'; return; }
  main.innerHTML = '';
  for (const c of data) {
    const card = h('div', { className: 'card' },
      h('h3', {}, c.name + ' ', h('span', {className:'badge ' + (c.status === 'active' ? 'badge-green' : 'badge-amber')}, c.status)),
      h('table', {},
        h('tr', {}, h('th',{},'ID'), h('td',{},c.id)),
        h('tr', {}, h('th',{},'Module'), h('td',{},c.module_name || '—')),
        h('tr', {}, h('th',{},'Saves'), h('td',{},String(c.save_count))),
        h('tr', {}, h('th',{},'Rule Set'), h('td',{},c.rule_set ? c.rule_set.game_system + ' ' + c.rule_set.edition + ' / ' + c.rule_set.release + ' [' + c.rule_set.locale + ']' : '—')),
        c.publications && c.publications.length ? h('tr', {}, h('th',{},'Publications'), h('td',{},c.publications.map(p => p.name + ' [' + p.type + ']').join(', '))) : null,
        c.description ? h('tr', {}, h('th',{},'Description'), h('td',{},c.description)) : null,
      )
    );
    main.appendChild(card);
  }
}

// ── Characters ──
async function showCharacters(main) {
  const all = await fetchJson('/api/dnd/characters');
  if (!all.length) { main.innerHTML = '<p>No characters</p>'; return; }
  const pcs = all.filter(c => c.character_type === 'pc');
  const npcs = all.filter(c => c.character_type === 'npc');

  function charTable(chars, label) {
    if (!chars.length) return h('p',{},'No ' + label);
    return h('div',{},
      h('h3',{}, label + ' (' + chars.length + ')'),
      h('table',{},
        h('tr',{},
          h('th',{},'Name'), h('th',{},'Class'), h('th',{},'Lv'), h('th',{},'HP'), h('th',{},'AC'),
          h('th',{},'Race'), h('th',{},'Alignment'), h('th',{},'Campaign'), h('th',{},'Player'),
        ),
        ...chars.map(c => h('tr',{},
          h('td',{},c.name),
          h('td',{},c.class_name || '—'),
          h('td',{},String(c.level)),
          h('td',{},c.hp + '/' + c.max_hp),
          h('td',{},String(c.armor_class)),
          h('td',{},c.race || '—'),
          h('td',{},c.alignment || '—'),
          h('td',{},c.campaign_id ? h('span',{className:'badge badge-blue'}, c.campaign_id) : '—'),
          h('td',{},c.player_name || '—'),
        )),
      ),
      h('div',{style:'margin-top:8px;display:flex;flex-wrap:wrap;gap:8px'},
        ...chars.map(c => h('div',{className:'card',style:'flex:1;min-width:200px'},
          h('h3',{},
            h('span',{className:'badge ' + (c.character_type === 'pc' ? 'badge-blue' : 'badge-purple')}, c.character_type.toUpperCase()),
            ' ' + c.name
          ), h('table',{},
            c.personality_traits ? h('tr',{},h('th',{},'Personality'), h('td',{},c.personality_traits)) : null,
            c.appearance ? h('tr',{},h('th',{},'Appearance'), h('td',{},c.appearance)) : null,
            c.backstory ? h('tr',{},h('th',{},'Backstory'), h('td',{},c.backstory)) : null,
            c.goals ? h('tr',{},h('th',{},'Goals'), h('td',{},c.goals)) : null,
            c.notes ? h('tr',{},h('th',{},'Notes'), h('td',{},c.notes)) : null,
          )
        ))
      )
    );
  }

  main.innerHTML = '';
  main.appendChild(charTable(pcs, 'PCs'));
  main.appendChild(charTable(npcs, 'NPCs'));
}

// ── World ──
async function showWorld(main) {
  const campaigns = await fetchJson('/api/dnd/campaigns');
  const active = campaigns.filter(c => c.status === 'active');
  if (!active.length) { main.innerHTML = '<p>No active campaigns</p>'; return; }
  main.innerHTML = '';
  for (const c of active) {
    try {
      const world = await fetchJson('/api/dnd/world/' + c.id);
      const card = h('div',{className:'card'},
        h('h3',{}, c.name + ' — ' + (world.summary || 'No summary')),
        h('h4',{},'Factions'),
        world.factions && Object.keys(world.factions).length ? h('table',{},
          h('tr',{},h('th',{},'Faction'),h('th',{},'Attitude'),h('th',{},'Score')),
          ...Object.entries(world.factions).map(([k,v]) => h('tr',{},h('td',{},k),h('td',{},v.attitude),h('td',{},String(v.score))))
        ) : h('p',{},'No factions'),
        h('h4',{},'Key NPCs'),
        world.npcs && Object.keys(world.npcs).length ? h('table',{},
          h('tr',{},h('th',{},'NPC'),h('th',{},'Attitude'),h('th',{},'Status'),h('th',{},'Location')),
          ...Object.entries(world.npcs).map(([k,v]) => h('tr',{},
            h('td',{},v.npc_name || k),
            h('td',{},v.attitude != null ? String(v.attitude) : '—'),
            h('td',{},v.status || '—'),
            h('td',{},v.location || '—'),
          ))
        ) : h('p',{},'No NPCs'),
      );
      main.appendChild(card);
    } catch (e) { /* skip if no world state for this campaign */ }
  }
}

// ── Rules ──
async function showRules(main) {
  const data = await fetchJson('/api/dnd/rules/status');
  if (!data.rule_sets?.length) { main.innerHTML = '<p>No rule sets</p>'; return; }
  main.innerHTML = '';
  for (const rs of data.rule_sets) {
    main.appendChild(h('div',{className:'card'},
      h('h3',{}, rs.game_system + ' ' + rs.edition + ' / ' + rs.release + ' [' + rs.locale + ']'),
      h('table',{},
        h('tr',{},h('th',{},'ID'),h('td',{},rs.id)),
        h('tr',{},h('th',{},'Publications'),h('td',{},String(rs.publications))),
        h('tr',{},h('th',{},'Chunks'),h('td',{},String(rs.chunks))),
      )
    ));
  }
}

// ── Saves ──
async function showSaves(main) {
  const campaigns = await fetchJson('/api/dnd/campaigns');
  if (!campaigns.length) { main.innerHTML = '<p>No campaigns</p>'; return; }
  main.innerHTML = '';
  let total = 0;
  for (const c of campaigns) {
    try {
      const saves = await fetchJson('/api/dnd/saves/' + c.id);
      if (!saves.length) continue;
      total += saves.length;
      main.appendChild(h('div',{className:'card'},
        h('h3',{}, c.name + ' (' + saves.length + ' saves)'),
        h('table',{},
          h('tr',{},h('th',{},'Slot'),h('th',{},'Label'),h('th',{},'Captured'),h('th',{},'ID')),
          ...saves.map(s => h('tr',{},
            h('td',{},String(s.slot)),h('td',{},s.label || '—'),h('td',{},s.captured_at ? s.captured_at.slice(0,19) : '—'),h('td',{},s.id)
          ))
        )
      ));
    } catch (e) { /* skip */ }
  }
  if (!total) main.innerHTML = '<p>No saves</p>';
}

init();
</script>
</body>
</html>
